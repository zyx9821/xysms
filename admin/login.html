<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>管理员登录 - 接码系统</title>
    <link rel="stylesheet" href="/assets/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="stylesheet" href="/assets/css/style.css">
    <link rel="stylesheet" href="/assets/css/login-custom.css">
</head>
<body>

<div id="login-wrapper">
    <div class="login-container">
        <form class="login-form" id="admin-login-form">
            <div style="text-align: center; margin-bottom: 20px;">
                <h1 style="margin: 0; font-size: 24px; color: #333;">后台管理登录</h1>
            </div>
            <div class="form-group">
                <input type="text" id="admin-username" class="form-control" placeholder="请输入管理员账号" required>
            </div>
            <div class="form-group">
                <input type="password" id="admin-password" class="form-control" placeholder="请输入管理员密码" required>
            </div>
            <button type="submit" class="xyrj-primary xyrj-login" id="login-btn">登录</button>
        </form>
        <div class="footer-link">
            <a href="/user/login.html">&rarr; 去往用户端</a>
        </div>
    </div>
</div>

<script src="/assets/js/jquery.min.js"></script>
<script>
    $('#admin-login-form').on('submit', function(e) {
        e.preventDefault();
        const username = $('#admin-username').val();
        const password = $('#admin-password').val();
        const $btn = $('#login-btn');
        
        $btn.prop('disabled', true).text('登录中...');
        
        $.ajax({
            url: '/api/admin/login',
            type: 'POST',
            contentType: 'application/json',
            data: JSON.stringify({ username, password }),
            success: function(res) {
                if (res.success) {
                    localStorage.setItem('adminToken', res.token);
                    window.location.href = '/admin/index.html';
                }
            },
            error: function() {
                alert('账号或密码错误！');
                $btn.prop('disabled', false).text('登录');
            }
        });
    });
</script>
</body>
</html>
