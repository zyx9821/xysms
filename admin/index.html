<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>后台管理 - 接码系统</title>
    <link rel="stylesheet" href="/assets/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="stylesheet" href="/assets/css/style.css">
    <script src="/assets/js/jquery.min.js"></script>
    <script src="/assets/js/bootstrap.min.js"></script>
    <script>
        // 鉴权拦截
        if (!localStorage.getItem('adminToken')) {
            window.location.href = '/admin/login.html';
        }
    </script>
</head>
<body>

<div id="admin-container" class="admin-container" style="display:flex;">
    <div class="admin-mobile-header">
        <div class="mobile-logo"><span>管理控制台</span></div>
        <button id="mobile-menu-toggle" class="btn btn-default"><i class="fas fa-bars"></i></button>
    </div>
    <div class="admin-overlay"></div>
    <div class="admin-sidebar">
        <div class="sidebar-header"><a href="#">系统管理后台</a></div>
        <ul class="nav nav-pills nav-stacked">
            <li class="active"><a data-toggle="tab" href="#api-config"><i class="fas fa-fw fa-link"></i> 接口配置</a></li>
            <li><a data-toggle="tab" href="#system-settings"><i class="fas fa-fw fa-cog"></i> 系统设置</a></li>
            <li><a href="#" id="logout-button"><i class="fas fa-fw fa-sign-out-alt"></i> 退出登录</a></li>
        </ul>
    </div>

    <div class="admin-content">
        <div class="tab-content">
            <div class="tab-pane fade in active" id="api-config">
                <div class="container-fluid">
                    <h3 style="margin-top: 15px; margin-bottom: 20px;">第三方 API 接口管理</h3>
                    <button class="btn btn-success" style="margin-bottom: 15px;"><i class="fas fa-plus"></i> 新增接口</button>
                    <div class="table-responsive">
                        <table class="table table-striped table-hover" id="apiList">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>平台名称</th>
                                    <th>接口地址</th>
                                    <th>状态</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr><td colspan="5" class="text-center">加载中...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div class="tab-pane fade" id="system-settings">
                <div class="container-fluid">
                    <h3 style="margin-top: 15px; margin-bottom: 20px;">系统安全与配置</h3>
                    <div class="panel panel-default">
                        <div class="panel-body">
                            <form id="configForm">
                                <div class="alert alert-info">此处修改的账号密码及系统时区将直接保存至 D1 数据库，实时生效。</div>
                                <div class="row">
                                    <div class="col-sm-6">
                                        <div class="form-group">
                                            <label>后台账号</label>
                                            <input type="text" class="form-control" id="ADMIN_USER" required>
                                        </div>
                                    </div>
                                    <div class="col-sm-6">
                                        <div class="form-group">
                                            <label>后台密码</label>
                                            <input type="text" class="form-control" id="ADMIN_PASS" required>
                                        </div>
                                    </div>
                                </div>
                                <div class="form-group">
                                    <label>系统时区</label>
                                    <input type="text" class="form-control" id="TIMEZONE" placeholder="例如: Asia/Shanghai" required>
                                </div>
                                <button type="button" class="btn btn-primary" onclick="saveSystemSettings()"><i class="fas fa-save"></i> 保存配置</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    $(document).ready(function() {
        // 移动端侧边栏切换
        $('#mobile-menu-toggle').click(function() {
            $('.admin-sidebar').toggleClass('is-visible');
            $('.admin-overlay').toggleClass('is-visible');
        });
        $('.admin-overlay').click(function() {
            $('.admin-sidebar').removeClass('is-visible');
            $('.admin-overlay').removeClass('is-visible');
        });

        // 退出登录
        $('#logout-button').click(function(e) {
            e.preventDefault();
            localStorage.removeItem('adminToken');
            window.location.href = '/admin/login.html';
        });

        // 获取系统配置回显
        $.get('/api/admin/settings', function(res) {
            if (res.success) {
                $('#ADMIN_USER').val(res.data.ADMIN_USER);
                $('#ADMIN_PASS').val(res.data.ADMIN_PASS);
                $('#TIMEZONE').val(res.data.TIMEZONE);
            }
        });
    });

    function saveSystemSettings() {
        const data = {
            ADMIN_USER: $('#ADMIN_USER').val(),
            ADMIN_PASS: $('#ADMIN_PASS').val(),
            TIMEZONE: $('#TIMEZONE').val()
        };
        $.ajax({
            url: '/api/admin/settings',
            type: 'POST',
            contentType: 'application/json',
            data: JSON.stringify(data),
            success: function(res) {
                if (res.success) alert('系统配置更新成功！');
            }
        });
    }
</script>
</body>
</html>
